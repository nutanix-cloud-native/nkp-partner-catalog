overview: |
  # Kubex for NKP

  Kubex continuously analyzes and automatically right-sizes Kubernetes workloads, eliminating wasted CPU and memory and maximizing GPU utilization, all without manual intervention. Installing this application deploys the Kubex data forwarder to your NKP cluster, connecting it to your Kubex instance and enabling autonomous, ongoing optimization. To get started, you'll need an active Kubex account. New users can begin a free trial at [kubex.ai](https://www.kubex.ai/).

  ---

  ## What Kubex Delivers

  **Automated Resource Optimization**
  Continuously analyzes container utilization and automatically right-sizes CPU and memory allocations, eliminating waste without risking application stability.

  **AI / GPU / Inference Resource Optimization**
  Dynamically manages high-density LLM inference workloads with intelligent GPU sharing, scheduling, and scaling across Kubernetes clusters.

  **Cluster-Wide Visibility**
  Provides SRE, Platform Engineering, and FinOps teams with full audit trails and platform-wide insight into resource footprints.

  **MCP Access for Teams and Agents**
  Kubex exposes an MCP server, giving teams and AI agents programmatic access to optimization data, recommendations, and actions via Claude, Cursor, or any MCP-compatible tool.

  ---

  ## Supported Workload Types

  **Traditional Microservices**
  Standard stateless and stateful application pods running across the cluster.

  **AI Inference Workloads**
  High-density LLM inference workloads requiring intelligent GPU sharing and strict governance.
